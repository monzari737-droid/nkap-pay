<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NKAP EXPRESS CASINO</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* --- ÉCRAN D'AUTH --- */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .gold-text { color: #f0b90b; text-shadow: 0 0 10px rgba(240, 185, 11, 0.5); }
        input { background: #1c2128; border: 2px solid #2d333b; color: white; padding: 15px; border-radius: 10px; width: 200px; text-align: center; font-size: 20px; letter-spacing: 5px; margin-top: 20px; }
        input:focus { border-color: #f0b90b; outline: none; }
        .btn-enter { background: #f0b90b; color: #0b0e11; font-weight: bold; border: none; padding: 15px 40px; border-radius: 30px; margin-top: 20px; cursor: pointer; font-size: 18px; }

        /* --- ÉCRAN CASINO (Masqué au début) --- */
        #casino-screen { display: none; padding: 15px; height: 100vh; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d333b; padding-bottom: 10px; }
        .live-tag { color: #2ebd85; font-size: 12px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .room-container { background: #1c2128; border-radius: 15px; height: 60%; margin-top: 15px; overflow-y: auto; padding: 10px; border: 1px solid #2d333b; }
        .table-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2d333b; font-size: 14px; }
        .is-me { background: rgba(240, 185, 11, 0.1); color: #f0b90b; border-radius: 5px; }

        .timer-circle { width: 60px; height: 60px; border: 4px solid #f0b90b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; margin: auto; }
        
        /* --- BARRE DE NAVIGATION --- */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2128; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2d333b; }
        .nav-item { text-align: center; font-size: 10px; color: #848e9c; text-decoration: none; }
        .nav-icon { font-size: 20px; display: block; color: white; }
    </style>
</head>
<body>

    <!-- ÉCRAN D'AUTHENTIFICATION -->
    <div id="auth-screen">
        <h1 class="gold-text">🎰 NKAP EXPRESS</h1>
        <p>Entrez votre Code Secret pour jouer</p>
        <input type="password" id="secret-code" maxlength="5" placeholder="•••••">
        <button class="btn-enter" onclick="checkAuth()">S'AUTHENTIFIER</button>
    </div>

    <!-- ÉCRAN PRINCIPAL DU CASINO -->
    <div id="casino-screen">
        <div class="header">
            <div><span class="live-tag">● EN DIRECT</span></div>
            <div id="user-balance" class="gold-text">Solde: 200 F</div>
        </div>

        <div class="timer-circle" id="timer">15</div>

        <div class="room-container" id="salle">
            <!-- Les joueurs (Bots + Toi) apparaîtront ici -->
            <div class="table-row">👤 Kamga | 250F | n°3</div>
            <div class="table-row">👤 Simo | 100F | n°1</div>
            <div class="table-row is-me">👤 VOUS | En attente...</div>
        </div>

        <div class="navbar">
            <div class="nav-item"><span class="nav-icon">📊</span>HISTO</div>
            <div class="nav-item" onclick="openBet()"><span class="nav-icon" style="color:#f0b90b; font-size: 30px;">💰</span>MISER</div>
            <div class="nav-item"><span class="nav-icon">👥</span>AMIS</div>
            <div class="nav-item"><span class="nav-icon">💳</span>BANQUE</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ouvre la WebApp en grand

        function checkAuth() {
            let code = document.getElementById('secret-code').value;
            if(code.length === 5) {
                // Ici l'IA simulera la validation ou enverra au bot
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('casino-screen').style.display = 'block';
            } else {
                alert("⚠️ Code invalide. Entrez les 5 chiffres reçus dans le bot.");
            }
        }

        // Simuler le chrono de 15s
        let timeLeft = 15;
        setInterval(() => {
            timeLeft = timeLeft <= 0 ? 15 : timeLeft - 1;
            let timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft;
            if(timeLeft <= 5) timerEl.style.borderColor = "#ff4d4d";
            else timerEl.style.borderColor = "#f0b90b";
        }, 1000);
    </script>
</body>
</html>
