<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org"></script>
</head>
<body>
    <!-- AUTH -->
    <div id="auth" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
        <h1 class="gold-text">🎰 NKAP EXPRESS</h1>
        <input type="password" id="code" placeholder="Code Secret" style="padding:10px; border-radius:10px; text-align:center;">
        <button onclick="login()" style="margin-top:20px; padding:10px 30px; background:#f0b90b; border:none; border-radius:20px; font-weight:bold;">ENTRER</button>
    </div>

    <!-- JEU -->
    <div id="game" class="hidden">
        <div class="header">
            <div style="color:var(--green)">● EN DIRECT</div>
            <div class="gold-text" id="balance">200 XAF</div>
        </div>
        <div class="timer-circle" id="chrono">15</div>
        <div class="room"><div id="players-list"></div></div>
        <div class="navbar">
            <div class="nav-item" onclick="showInfo('parrainage')">👥<br>AMIS</div>
            <div class="nav-item" style="color:var(--gold)" onclick="alert('Mise 1-500F')">💰<br><b>MISER</b></div>
            <div class="nav-item" onclick="showInfo('banque')">💳<br>BANQUE</div>
            <div class="nav-item" onclick="showInfo('aide')">❓<br>AIDE</div>
        </div>
    </div>

    <script src="names.js"></script>
    <script src="ui.js"></script>
    <script src="engine.js"></script>
    <script>
        function login() {
            if(document.getElementById('code').value.length === 5) {
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                window.runCasino();
            }
        }
        window.onload = () => { if(window.Telegram.WebApp) window.Telegram.WebApp.expand(); };
    </script>
</body>
</html>
